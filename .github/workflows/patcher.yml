name: TopFollow_Ultimate_Patcher

on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🛠 Install Tools (Fixed)
        run: |
          sudo apt-get update
          sudo apt-get install -y zipalign apksigner
          # Jadx va Apktool'ni qo'lda yuklab olamiz (Repository xatosini chetlab o'tish uchun)
          curl -L -o apktool.jar "https://bitbucket.org/iBotPeaches/apktool/downloads/apktool_2.9.3.jar"
          curl -L -o jadx.zip "https://github.com/skylot/jadx/releases/download/v1.4.7/jadx-1.4.7.zip"
          unzip jadx.zip -d jadx_dir
          echo "$(pwd)/jadx_dir/bin" >> $GITHUB_PATH

      - name: 🌐 Download Target APK
        run: |
          # Google Drive'dan yuklash (Alternative link)
          curl -L "https://drive.google.com/uc?export=download&id=1hkCK1xdyXMEx99P8pAn2Xl5e8mi9S9Un" -o target.apk

      - name: 🔓 Decompile and Patch
        run: |
          # Java kodlarini ochish
          jadx -d out_java target.apk
          # Smali kodlarini ochish
          java -jar apktool.jar d target.apk -o out_apk
          
          echo "🔍 SSL va Litsenziyani bypass qilish..."
          # SSL Pinning Bypass
          find out_apk -name "*.smali" -print0 | xargs -0 sed -i 's/checkClientTrusted/checkClientTrusted_patched/g'
          find out_apk -name "*.smali" -print0 | xargs -0 sed -i 's/checkServerTrusted/checkServerTrusted_patched/g'
          
          # Litsenziya 'isLicensed' funksiyasini majburiy 'True' qilish
          # Smali kodida 'return v0' dan oldin 'const/4 v0, 0x1' qo'shamiz
          grep -rl "isLicensed()Z" out_apk | xargs sed -i 's/isLicensed()Z/isLicensed()Z\n    const\/4 v0, 0x1\n    return v0/g' || true

      - name: 🏗 Build Patched APK
        run: |
          java -jar apktool.jar b out_apk -o unaligned.apk
          zipalign -v 4 unaligned.apk aligned.apk

      - name: ✍️ Sign APK
        run: |
          keytool -genkey -v -keystore test.keystore -alias test -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=AI, O=mkl"
          apksigner sign --ks test.keystore --ks-pass pass:123456 --out TopFollow_MOD_Final.apk aligned.apk

      - name: 📤 Upload Result
        uses: actions/upload-artifact@v4
        with:
          name: Patched-Files-Result
          path: |
            TopFollow_MOD_Final.apk
            out_java
            
