name: 🔍 TopFollow_Encryption_Hunter

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deep-scan:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Repositoryni yuklash
        uses: actions/checkout@v4

      - name: ☕ Java 17 sozlash
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🛠 Instrumentlarni qo'lda o'rnatish (Xatosiz variant)
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          pip3 install gdown --break-system-packages || pip3 install gdown
          
          # JADX ni yuklab olish va sozlash
          curl -L -o jadx.zip "https://github.com/skylot/jadx/releases/download/v1.4.7/jadx-1.4.7.zip"
          unzip jadx.zip -d jadx_dir
          echo "$(pwd)/jadx_dir/bin" >> $GITHUB_PATH

      - name: 🌐 APKni yuklab olish
        run: |
          gdown --id 1hkCK1xdyXMEx99P8pAn2Xl5e8mi9S9Un -O target.apk

      - name: 🔓 Shifrlash sirlarini qidirish
        run: |
          # Java kodiga o'girish
          jadx -d out_java target.apk
          
          echo "--- 🛡 SHIFRLASHGA ALOQADOR FAYLLAR ---" > report.txt
          grep -rlE "AES|DES|SecretKeySpec|IvParameterSpec|encrypt|decrypt" out_java >> report.txt || true
          
          echo -e "\n--- 🔑 TOPILGAN KALITLAR ---" >> report.txt
          grep -rE "\"[A-Za-z0-9+/]{16,}\"" out_java >> report.txt || true
          
          echo -e "\n--- 🛰 x1 PARAMETR QIDIRUVI ---" >> report.txt
          grep -r "put.*\"x1\"" out_java >> report.txt || true

      - name: 📤 Hisobotni yuklash
        uses: actions/upload-artifact@v4
        with:
          name: Analysis-Report
          path: report.txt
          
