name: TopFollow_Ultimate_Patcher_Final

on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🛠 Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zipalign apksigner python3-pip
          pip3 install gdown
          # Apktool yuklash
          curl -L -o apktool.jar "https://bitbucket.org/iBotPeaches/apktool/downloads/apktool_2.9.3.jar"
          # Jadx yuklash
          curl -L -o jadx.zip "https://github.com/skylot/jadx/releases/download/v1.4.7/jadx-1.4.7.zip"
          unzip jadx.zip -d jadx_dir
          echo "$(pwd)/jadx_dir/bin" >> $GITHUB_PATH

      - name: 🌐 Download Target APK (Fixed with gdown)
        run: |
          # Google Drive-dan faylni to'g'ri yuklash
          gdown --id 1hkCK1xdyXMEx99P8pAn2Xl5e8mi9S9Un -O target.apk

      - name: 🔓 Decompile and Patch
        run: |
          # Agar fayl yuklanmagan bo'lsa build to'xtaydi
          if [ ! -f target.apk ]; then echo "Fayl topilmadi!"; exit 1; fi
          
          # Dekompilyatsiya
          jadx -d out_java target.apk
          java -jar apktool.jar d target.apk -o out_apk
          
          echo "🔍 Patching starts..."
          # SSL Pinning Bypass
          find out_apk -name "*.smali" -print0 | xargs -0 sed -i 's/checkClientTrusted/checkClientTrusted_patched/g' || true
          find out_apk -name "*.smali" -print0 | xargs -0 sed -i 's/checkServerTrusted/checkServerTrusted_patched/g' || true
          
          # Litsenziyani 'True' qilish
          grep -rl "isLicensed()Z" out_apk | xargs sed -i 's/isLicensed()Z/isLicensed()Z\n    const\/4 v0, 0x1\n    return v0/g' || true

      - name: 🏗 Build and Sign
        run: |
          java -jar apktool.jar b out_apk -o unaligned.apk
          zipalign -v 4 unaligned.apk aligned.apk
          keytool -genkey -v -keystore test.keystore -alias test -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=AI, O=mkl"
          apksigner sign --ks test.keystore --ks-pass pass:123456 --out TopFollow_MOD_Fixed.apk aligned.apk

      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Final-Result
          path: |
            TopFollow_MOD_Fixed.apk
            out_java
            
