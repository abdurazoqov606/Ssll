name: TopFollow_Deep_Analyzer

on: 
  workflow_dispatch:

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🛠 Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y jadx python3-pip
          pip3 install gdown

      - name: 🌐 Download APK
        run: |
          gdown --id 1hkCK1xdyXMEx99P8pAn2Xl5e8mi9S9Un -O target.apk

      - name: 🔍 Deep Search for Encryption (Shifrlashni qidirish)
        run: |
          jadx -d out_java target.apk
          echo "--- SHIFRLASHGA ALOQADOR KLASSLAR ---"
          # 'encrypt', 'decrypt', 'x1', 'x9' so'zlarini barcha Java fayllardan qidiramiz
          grep -rlE "encrypt|decrypt|x1|x9|AES|RSA" out_java/com/nivaroid/topfollow > findings.txt
          
          echo "--- MUHIM FUNKSIYALAR ---"
          grep -rE "public.*String.*(x1|x4|x9)" out_java >> findings.txt || true

      - name: 📤 Upload Findings
        uses: actions/upload-artifact@v4
        with:
          name: Encryption-Analysis
          path: findings.txt
          
