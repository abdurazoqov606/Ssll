name: TopFollow_God_Patcher

# Faylni saqlashingiz bilan yoki qo'lda ishga tushirish uchun:
on: 
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v3

      - name: ☕ Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: 🛠 Install Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y zipalign apksigner jadx
          curl -L -o apktool.jar "https://bitbucket.org/iBotPeaches/apktool/downloads/apktool_2.9.3.jar"

      - name: 🌐 Download Target APK
        run: |
          # Google Drive Direct Link
          curl -L -o target.apk "https://drive.google.com/uc?id=1hkCK1xdyXMEx99P8pAn2Xl5e8mi9S9Un"

      - name: 🔓 Decompile and Patch
        run: |
          # Java kodlarini ochish (Tahlil uchun)
          jadx -d out_java target.apk
          # Smali kodlarini ochish (Patch uchun)
          java -jar apktool.jar d target.apk -o out_apk
          
          echo "🔍 SSL va Litsenziyani yo'qotish..."
          # SSL Pinning Bypass (Har qanday proxy uchun)
          find out_apk -name "*.smali" -print0 | xargs -0 sed -i 's/checkClientTrusted/checkClientTrusted_patched/g'
          find out_apk -name "*.smali" -print0 | xargs -0 sed -i 's/checkServerTrusted/checkServerTrusted_patched/g'
          
          # Litsenziya tekshiruvini majburiy 'True' qilish
          find out_apk -name "*.smali" -print0 | xargs -0 sed -i 's/isLicensed()Z/isLicensed()Z\n    const\/4 v0, 0x1\n    return v0/g'

      - name: 🏗 Build Patched APK
        run: |
          java -jar apktool.jar b out_apk -o unaligned.apk
          zipalign -v 4 unaligned.apk aligned.apk

      - name: ✍️ Sign APK
        run: |
          keytool -genkey -v -keystore test.keystore -alias test -keyalg RSA -keysize 2048 -validity 10000 -storepass 123456 -keypass 123456 -dname "CN=AI, O=mkl"
          apksigner sign --ks test.keystore --ks-pass pass:123456 --out TopFollow_MOD_Final.apk aligned.apk

      - name: 📤 Upload Result
        uses: actions/upload-artifact@v3
        with:
          name: Patched-APK-and-Source
          path: |
            TopFollow_MOD_Final.apk
            out_java
            
